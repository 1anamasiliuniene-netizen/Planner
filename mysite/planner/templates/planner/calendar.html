{% extends "planner/base.html" %}
{% load static %}

{% block title %}Calendar{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0"><i class="bi bi-calendar-event"></i> Calendar</h2>
    <a href="{% url 'event_create' %}" class="btn btn-success">
        <i class="bi bi-plus-lg"></i> Add Event
    </a>
</div>

<!-- FullCalendar -->
<div id="calendar"></div>

<!-- FullCalendar CSS & JS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.5/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.5/index.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: '{{ initial_view|default:"dayGridMonth" }}',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        height: 'auto',
        events: [
            {% for event in events %}
            {
                id: '{{ event.pk }}',
                title: '{{ event.title|escapejs }}'{% if event.is_new %} + ' (NEW)'{% endif %},
                start: '{{ event.start_time|date:"Y-m-d\\TH:i:s" }}',
                end: '{{ event.end_time|date:"Y-m-d\\TH:i:s" }}',
                extendedProps: {
                    workspace: '{{ event.workspace.name|escapejs }}',
                    location: '{{ event.location|escapejs }}',
                    notes: '{{ event.notes|escapejs }}'
                },
                url: '{% url "event_detail" event.pk %}',
                backgroundColor: '{% if event.is_new %}#f59f00{% else %}#0d6efd{% endif %}',
                borderColor: '{% if event.is_new %}#f08c00{% else %}#0d6efd{% endif %}'
            },
            {% endfor %}
        ],
        eventDidMount: function(info) {
            // Tooltip with workspace, location and notes
            var tooltip = info.event.extendedProps.workspace ? 'Workspace: ' + info.event.extendedProps.workspace : '';
            if (info.event.extendedProps.location) {
                tooltip += tooltip ? ' | ' + info.event.extendedProps.location : info.event.extendedProps.location;
            }
            if (info.event.extendedProps.notes) {
                tooltip += tooltip ? ' | ' + info.event.extendedProps.notes : info.event.extendedProps.notes;
            }
            if (tooltip) {
                info.el.setAttribute('title', tooltip);
            }
        }
    });

    calendar.render();
});
</script>

<style>
/* Make calendar cards consistent with other cards */
#calendar {
    max-width: 100%;
    margin: auto;
}

.fc .fc-toolbar-title {
    font-weight: 600;
    font-size: 1.5rem;
}

.fc .fc-event {
    border-radius: 0.75rem;
    padding: 0.3rem 0.5rem;
    font-size: 0.875rem;
    cursor: pointer;
}
</style>
{% endblock %}
