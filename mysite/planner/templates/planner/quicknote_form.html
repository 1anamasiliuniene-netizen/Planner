{% extends "planner/base.html" %}
{% load crispy_forms_tags %}
{% block title %}{% if is_create %}New Memo{% else %}Edit Memo{% endif %}{% endblock %}

{% block content %}
<h2 class="mb-4">{% if is_create %}New Memo{% else %}Edit Memo{% endif %}</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary mt-2">
        {% if is_create %}Create{% else %}Save{% endif %}
    </button>
    <a href="{% url 'quicknote_list' %}" class="btn btn-secondary mt-2">Cancel</a>
</form>
{% endblock %}
