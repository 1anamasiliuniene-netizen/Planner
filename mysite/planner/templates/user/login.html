{% extends "planner/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary mt-2 w-100">Login</button>
        </form>

        <div class="d-flex align-items-center my-3">
            <hr class="flex-grow-1">
            <span class="mx-2 text-muted small">or</span>
            <hr class="flex-grow-1">
        </div>

        <a href="{% url 'demo_login' %}" class="btn btn-outline-secondary w-100">
            <i class="bi bi-eye"></i> Try Demo (no account needed)
        </a>

        <p class="mt-3 mb-1 small">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
        <p class="mb-0 small"><a href="{% url 'password_reset' %}">Forgot password?</a></p>
    </div>
</div>
{% endblock %}
